services:
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: prd_software
      POSTGRES_USER: prd
      POSTGRES_PASSWORD: prd
    ports:
      - "5432:5432"
    volumes:
      - prd-postgres-data:/var/lib/postgresql/data
      - ./database-schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prd -d prd_software"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  prd-postgres-data:
