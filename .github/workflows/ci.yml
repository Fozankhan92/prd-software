name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  desktop-shell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5
        with:
          version: 10
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - run: pnpm --dir apps/web install
      - run: pnpm --dir apps/web test
      - run: cd apps/web && node_modules/.bin/tsc --noEmit --project tsconfig.json
      - run: pnpm --dir apps/web run build
      - run: sudo apt-get update
      - run: sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - run: cargo fmt --manifest-path apps/web/src-tauri/Cargo.toml -- --check
      - run: cargo check --manifest-path apps/web/src-tauri/Cargo.toml
