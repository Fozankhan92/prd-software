name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  desktop-shell:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: pnpm install
      - run: pnpm test
      - run: pnpm run lint
      - run: pnpm run build
